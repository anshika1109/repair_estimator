<script>
// Force unregister all service workers immediately
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(registrations) {
    for (var i = 0; i < registrations.length; i++) {
      registrations[i].unregister();
    }
  });
  if (navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({type: 'SKIP_WAITING'});
  }
}
// Clear all caches
if ('caches' in window) {
  caches.keys().then(function(names) {
    for (var i = 0; i < names.length; i++) { caches.delete(names[i]); }
  });
}
</script>

const MISC_ITEMS = ["ig-20","ig-21","ig-25","ig-26","ig-27","ig-28"];

// ========== APP STATE ==========
let state = {
  projects: [],
  activeProjectId: null,
  activeTab: 'projects',
  globalPrices: null, // null means use DEFAULT_PRICES
};

function loadState() {
  try {
    const saved = localStorage.getItem('spark_estimator_state');
    if (saved) { state = JSON.parse(saved); }
    const gp = localStorage.getItem('spark_global_prices');
    if (gp) { state.globalPrices = JSON.parse(gp); }
  } catch(e) { console.error('Failed to load state', e); }
}

function saveState() {
  try {
    localStorage.setItem('spark_estimator_state', JSON.stringify({
      projects: state.projects,
      activeProjectId: state.activeProjectId,
      activeTab: state.activeTab,
    }));
    if (state.globalPrices) {
      localStorage.setItem('spark_global_prices', JSON.stringify(state.globalPrices));
    }
  } catch(e) { console.error('Failed to save state', e); }
}

function getPrice(itemId, project) {
  // Per-project override first
  if (project && project.priceOverrides && project.priceOverrides[itemId] !== undefined) {
    return project.priceOverrides[itemId];
  }
  // Custom items
  if (project && project.customItems) {
    const custom = project.customItems.find(c => c.id === itemId);
    if (custom) return custom.cost;
  }
  // Global override
  if (state.globalPrices) {
    const gp = state.globalPrices.find(p => p.id === itemId);
    if (gp) return gp.cost;
  }
  // Default
  const dp = DEFAULT_PRICES.find(p => p.id === itemId);
  return dp ? dp.cost : 0;
}

function getItemInfo(itemId) {
  // Check custom items in active project first
  const project = getActiveProject();
  if (project && project.customItems) {
    const custom = project.customItems.find(c => c.id === itemId);
    if (custom) return custom;
  }
  if (state.globalPrices) {
    const gp = state.globalPrices.find(p => p.id === itemId);
    if (gp) return gp;
  }
  return DEFAULT_PRICES.find(p => p.id === itemId) || { id: itemId, name: itemId, cost: 0, unit: 'ea.' };
}

function getActiveProject() {
  return state.projects.find(p => p.id === state.activeProjectId) || null;
}

function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }

function formatCurrency(n) { return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

function numOnly(e) {
  const ch = String.fromCharCode(e.which || e.keyCode);
  if (!/[0-9.]/.test(ch)) { e.preventDefault(); return false; }
  return true;
}

// ========== PROJECT MANAGEMENT ==========
function createProject(name) {
  const project = {
    id: generateId(),
    name: name || 'New Project',
    createdAt: new Date().toISOString(),
    rooms: [
      { id: generateId(), type: 'interior', instance: 1 },
      { id: generateId(), type: 'kitchen', instance: 1 },
      { id: generateId(), type: 'bathroom', instance: 1 },
      { id: generateId(), type: 'systems', instance: 1 },
      { id: generateId(), type: 'exterior', instance: 1 },
    ],
    lineItems: {}, // { "roomId-groupId-itemId": { qty: 0, checked: false } }
    noActionGroups: {}, // { "roomId-groupId": true }
    priceOverrides: {},
    photos: [], // { id, dataUrl, timestamp, note }
    customItems: [], // { id, name, cost, unit, section }
    deal: { arv: 0, purchasePrice: 0, holdingCosts: 0 },
  };
  state.projects.push(project);
  state.activeProjectId = project.id;
  saveState();
  return project;
}

function deleteProject(id) {
  state.projects = state.projects.filter(p => p.id !== id);
  if (state.activeProjectId === id) {
    state.activeProjectId = state.projects.length > 0 ? state.projects[0].id : null;
  }
  saveState();
}

// ========== CALCULATION ==========
function calculateTotal(project) {
  if (!project) return 0;
  let total = 0;
  Object.entries(project.lineItems).forEach(([key, val]) => {
    if (val.qty > 0) {
      const itemId = key.split('-').slice(2).join('-');
      const cost = getPrice(itemId, project);
      total += val.qty * cost;
    }
  });
  return total;
}

function calculateProgress(project) {
  if (!project) return { completed: 0, total: 0, percent: 0 };
  let totalGroups = 0;
  let completedGroups = 0;
  
  project.rooms.forEach(room => {
    const roomType = ROOM_TYPES[room.type];
    if (!roomType) return;
    roomType.groups.forEach(group => {
      totalGroups++;
      const groupKey = `${room.id}-${group.id}`;
      // Check if "no action" is set
      if (project.noActionGroups[groupKey]) { completedGroups++; return; }
      // Check if any item has qty > 0
      const hasItem = group.items.some(itemId => {
        const key = `${room.id}-${group.id}-${itemId}`;
        return project.lineItems[key] && project.lineItems[key].qty > 0;
      });
      if (hasItem) completedGroups++;
    });
  });
  
  const percent = totalGroups > 0 ? Math.round((completedGroups / totalGroups) * 100) : 0;
  return { completed: completedGroups, total: totalGroups, percent };
}

// ========== UI RENDERING ==========
function switchTab(tab) {
  state.activeTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  render();
}

function updateHeader() {
  const project = getActiveProject();
  const isProjectsTab = state.activeTab === 'projects';
  const total = isProjectsTab ? 0 : calculateTotal(project);
  document.getElementById('header-total').textContent = formatCurrency(total);
  
  const progress = calculateProgress(project);
  document.getElementById('progress-bar').style.width = (isProjectsTab ? 0 : progress.percent) + '%';
  document.getElementById('progress-text').textContent = project && !isProjectsTab ? `${progress.percent}% Complete (${progress.completed}/${progress.total} groups)` : '0% Complete';
  
  // Show/hide progress bar when no project or on projects tab
  const show = (project && !isProjectsTab) ? '' : 'none';
  document.getElementById('progress-container').style.display = show;
  document.getElementById('progress-text').style.display = show;
}

function render() {
  const main = document.getElementById('main-content');
  updateHeader();
  
  switch(state.activeTab) {
    case 'projects': renderProjects(main); break;
    case 'estimate': renderEstimate(main); break;
    case 'photos': renderPhotos(main); break;
    case 'deal': renderDeal(main); break;
    case 'export': renderExport(main); break;
  }
}

function promptNewProject() {
  const name = prompt('Project name:', 'New Property');
  if (name) { createProject(name); switchTab('estimate'); }
}

function selectProject(id) {
  state.activeProjectId = id;
  saveState();
  switchTab('estimate');
}

function renameProject(id) {
  const p = state.projects.find(x => x.id === id);
  if (!p) return;
  const name = prompt('Rename project:', p.name);
  if (name) { p.name = name; saveState(); render(); }
}

function confirmDeleteProject(id) {
  if (confirm('Delete this project? This cannot be undone.')) { deleteProject(id); render(); }
}

function handleCSVUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.split(/\r?\n/);
    const prices = [];
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      // Parse CSV line handling quoted fields
      const fields = [];
      let current = '';
      let inQuotes = false;
      for (let c = 0; c < line.length; c++) {
        const ch = line[c];
        if (ch === '"') { inQuotes = !inQuotes; }
        else if (ch === ',' && !inQuotes) { fields.push(current.trim()); current = ''; }
        else { current += ch; }
      }
      fields.push(current.trim());
      if (fields.length >= 4) {
        const cost = parseFloat(fields[2]);
        if (!isNaN(cost)) {
          prices.push({ id: fields[0], name: fields[1], cost: cost, unit: fields[3] });
        }
      }
    }
    if (prices.length > 0) {
      state.globalPrices = prices;
      saveState();
      alert(prices.length + ' prices updated!');
      render();
    } else {
      alert('No valid prices found in CSV. Make sure format is: id,name,cost,unit');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetGlobalPrices() {
  state.globalPrices = null;
  localStorage.removeItem('spark_global_prices');
  saveState(); render();
}

// ========== ESTIMATE TAB ==========
let activeSectionIdx = 0;

function getSections(project) {
  // Build an ordered list of sections from the project's rooms
  const sections = [];
  const sectionOrder = ['interior','kitchen','bathroom','bedroom','living','systems','exterior'];
  sectionOrder.forEach(type => {
    const rooms = project.rooms.filter(r => r.type === type);
    rooms.forEach(room => {
      const rt = ROOM_TYPES[room.type];
      const label = rt.singleton ? rt.name : `${rt.name} ${room.instance}`;
      sections.push({ room, type, label, groups: rt.groups });
    });
  });
  // Add Misc as last section
  sections.push({ room: { id: 'misc', type: 'misc' }, type: 'misc', label: 'Miscellaneous', groups: [{ id: 'misc', name: 'Misc / General', items: MISC_ITEMS }] });
  return sections;
}

function renderEstimate(container) {
  const project = getActiveProject();

    return;
  }

  const sections = getSections(project);
  if (activeSectionIdx >= sections.length) activeSectionIdx = sections.length - 1;
  if (activeSectionIdx < 0) activeSectionIdx = 0;
  const currentSection = sections[activeSectionIdx];

  let html = '';

  // Room management bar
  html += '<div class="card" style="padding:12px;">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">';
  html += '<div style="font-size:13px;font-weight:600;">Rooms</div>';
  html += `<select class="input" onchange="addRoom(this.value);this.value='';" style="font-size:12px;padding:6px 10px;width:auto;">
    <option value="">+ Add Room</option>
    <option value="bathroom">+ Bathroom</option>
    <option value="kitchen">+ Kitchen</option>
    <option value="bedroom">+ Bedroom</option>
    <option value="living">+ Living / Common Area</option>
  </select>`;
  html += '</div>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:4px;">';
  project.rooms.forEach(room => {
    const rt = ROOM_TYPES[room.type];
    const label = rt.singleton ? rt.name : `${rt.name} ${room.instance}`;
    html += `<span class="room-chip"><span>${label}</span>${!rt.singleton ? `<span class="remove-room" onclick="event.stopPropagation();removeRoom('${room.id}')">×</span>` : ''}</span>`;
  });
  html += '</div></div>';

  // Section tabs (horizontal scroll)
  html += '<div class="section-tabs">';
  sections.forEach((sec, idx) => {
    html += `<button class="section-tab ${idx === activeSectionIdx ? 'active' : ''}" onclick="goToSection(${idx})">${sec.label}</button>`;
  });
  html += '</div>';

  // Section label
  html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 4px;">';
  html += `<div class="section-title" style="margin:0;">${currentSection.label}</div>`;
  html += '</div>';

  // Groups and line items for current section
  currentSection.groups.forEach(group => {
    const groupKey = `${currentSection.room.id}-${group.id}`;
    const isNoAction = project.noActionGroups[groupKey];
    const isOpen = !isNoAction;

    html += '<div class="card" style="padding:0;overflow:hidden;">';

    // Group header
    html += `<div class="group-header-new" onclick="toggleGroup('${groupKey}')">
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="chevron ${isOpen ? 'open' : ''}" id="chev-${groupKey}">›</span>
        <h3>${group.name}</h3>
      </div>
    </div>`;

    html += `<div class="group-items-new ${isNoAction ? 'hidden' : ''}" id="group-${groupKey}">`;

    // No action needed option
    html += `<div class="line-item-card ${isNoAction ? 'selected no-action-selected' : ''}" onclick="toggleNoAction('${currentSection.room.id}','${group.id}')">
      <div class="item-radio ${isNoAction ? 'checked' : ''}"></div>
      <div class="item-info"><div class="item-name" style="font-style:italic;color:var(--spark-gray);">No action needed</div></div>
    </div>`;

    // Line items
    group.items.forEach(itemId => {
      const info = getItemInfo(itemId);
      const key = `${currentSection.room.id}-${group.id}-${itemId}`;
      const lineItem = project.lineItems[key] || { qty: 0 };
      const cost = getPrice(itemId, project);
      const total = lineItem.qty * cost;
      const isChecked = lineItem.qty > 0;

      html += `<div class="line-item-card ${isChecked ? 'selected' : ''}">
        <div class="item-radio ${isChecked ? 'checked' : ''}" onclick="toggleItem('${key}')"></div>
        <div class="item-info" onclick="toggleItem('${key}')">
          <div class="item-name">${info.name}</div>
          <div class="item-cost">${formatCurrency(cost)} / ${info.unit}</div>
        </div>
        <div class="item-qty-area">
          <input type="number" inputmode="decimal" pattern="[0-9]*" class="qty-input" value="${lineItem.qty || ''}" min="0" step="any" placeholder="0"
            onkeypress="return numOnly(event)" onchange="updateQty('${key}',this.value)" oninput="updateQty('${key}',this.value)">
          <div class="item-line-total">${total > 0 ? formatCurrency(total) : ''}</div>
        </div>
      </div>`;
    });

    // Custom items for this group
    if (project.customItems) {
      project.customItems.filter(ci => ci.roomId === currentSection.room.id && ci.groupId === group.id).forEach(ci => {
        const key = `${currentSection.room.id}-${group.id}-${ci.id}`;
        const lineItem = project.lineItems[key] || { qty: 0 };
        const total = lineItem.qty * ci.cost;
        const isChecked = lineItem.qty > 0;

        html += `<div class="line-item-card ${isChecked ? 'selected' : ''}">
          <div class="item-radio ${isChecked ? 'checked' : ''}" onclick="toggleItem('${key}')"></div>

            <div class="item-cost">${formatCurrency(ci.cost)} / ${ci.unit}</div>
          </div>
          <div class="item-qty-area">
            <input type="number" inputmode="decimal" pattern="[0-9]*" class="qty-input" value="${lineItem.qty || ''}" min="0" step="any" placeholder="0"
              onkeypress="return numOnly(event)" onchange="updateQty('${key}',this.value)" oninput="updateQty('${key}',this.value)">
            <div class="item-line-total">${total > 0 ? formatCurrency(total) : ''}</div>
          </div>

    html += `<div style="padding:10px 16px;"><button class="btn btn-sm btn-secondary" style="font-size:12px;" onclick="addCustomItem('${currentSection.room.id}','${group.id}')">+ Add Item</button></div>`;

  html += '<div class="nav-buttons">';

    html += `<button class="btn btn-primary nav-next" onclick="switchTab('photos')">Photos →</button>`;
  } else {
    html += `<button class="btn btn-primary nav-next" onclick="goToSection(${activeSectionIdx + 1})">Next →</button>`;
  }

  container.innerHTML = html;

  // Scroll active tab into view
  setTimeout(() => {
    const activeTab = container.querySelector('.section-tab.active');

}

function goToSection(idx) {
  const project = getActiveProject();
  if (!project) return;
  const sections = getSections(project);
  if (idx < 0 || idx >= sections.length) return;
  activeSectionIdx = idx;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleItem(key) {
  const project = getActiveProject();
  if (!project) return;
  const li = project.lineItems[key];
  if (li && li.qty > 0) {
    delete project.lineItems[key];
  } else {
    project.lineItems[key] = { qty: 1 };
  }
  saveState();
  render();
}

function updateQty(key, value) {
  const project = getActiveProject();
  if (!project) return;
  const sanitized = value.replace(/[^0-9.]/g, '');
  const qty = parseFloat(sanitized) || 0;
  if (qty > 0) {
    project.lineItems[key] = { qty };
  } else {
    delete project.lineItems[key];
  }
  saveState();
  updateHeader();
}

function toggleGroup(groupKey) {
  const el = document.getElementById('group-' + groupKey);
  const chev = document.getElementById('chev-' + groupKey);
  if (el) { el.classList.toggle('hidden'); }
  if (chev) { chev.classList.toggle('open'); }
}

function toggleNoAction(roomId, groupId) {
  const project = getActiveProject();
  if (!project) return;
  const key = `${roomId}-${groupId}`;
  project.noActionGroups[key] = !project.noActionGroups[key];
  saveState();
  render();
}

function addRoom(type) {
  if (!type) return;
  const project = getActiveProject();
  if (!project) return;
  const existing = project.rooms.filter(r => r.type === type);
  const instance = existing.length + 1;
  project.rooms.push({ id: generateId(), type, instance });
  saveState();
  render();
}

function removeRoom(roomId) {
  const project = getActiveProject();
  if (!project) return;
  if (!confirm('Remove this room?')) return;
  project.rooms = project.rooms.filter(r => r.id !== roomId);
  // Clean up line items for this room
  Object.keys(project.lineItems).forEach(key => {
    if (key.startsWith(roomId + '-')) delete project.lineItems[key];
  });
  Object.keys(project.noActionGroups).forEach(key => {
    if (key.startsWith(roomId + '-')) delete project.noActionGroups[key];
  });
  saveState();
  render();
}

function addCustomItem(roomId, groupId) {
  const name = prompt('Item name:');
  if (!name) return;
  const cost = parseFloat(prompt('Unit cost ($):', '0')) || 0;
  const unit = prompt('Unit type (sqft, ea., etc.):', 'ea.') || 'ea.';
  const id = 'custom-' + generateId();
  const project = getActiveProject();
  if (!project) return;
  if (!project.customItems) project.customItems = [];
  project.customItems.push({ id, name, cost, unit, roomId, groupId });
  // Auto-set qty to 1
  const key = `${roomId}-${groupId}-${id}`;
  project.lineItems[key] = { qty: 1 };
  saveState();
  render();
}

function removeCustomItem(itemId) {
  const project = getActiveProject();
  if (!project) return;
  if (!confirm('Remove this custom item?')) return;
  project.customItems = (project.customItems || []).filter(c => c.id !== itemId);
  // Remove line item entries for this custom item
  Object.keys(project.lineItems).forEach(key => {
    if (key.endsWith('-' + itemId)) delete project.lineItems[key];
  });
  saveState();
  render();
}

// ========== PHOTOS TAB ==========
function renderPhotos(container) {
  const project = getActiveProject();
  if (!project) {
    container.innerHTML = '<div class="card" style="text-align:center;padding:40px 20px;"><p style="color:var(--spark-gray);">Select a project first.</p></div>';
    return;
  }
  
  let html = '<div class="card">';
  html += '<h2 style="font-size:18px;font-weight:700;margin:0 0 12px;">📷 Photos</h2>';
  html += '<p style="font-size:13px;color:var(--spark-gray);margin:0 0 12px;">Capture serial numbers, damage, and condition photos.</p>';
  
  html += `<input type="file" id="photo-input" accept="image/*" capture="environment" onchange="handlePhoto(event)" style="display:none;" multiple>`;
  html += `<button class="btn btn-primary btn-block" onclick="document.getElementById('photo-input').click()">📷 Take Photo</button>`;
  html += '</div>';
  
  if (project.photos && project.photos.length > 0) {
    html += '<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:12px;">' + project.photos.length + ' photo(s)</div>';
    html += '<div class="photo-grid">';
    project.photos.forEach((photo, idx) => {
      html += `<div class="photo-thumb">
        <img src="${photo.dataUrl}" alt="Photo ${idx+1}" onclick="viewPhoto(${idx})">
        <button class="remove-photo" onclick="removePhoto(${idx})">×</button>
      </div>`;
    });
    html += '</div></div>';
  }
  
  container.innerHTML = html;
}

function handlePhoto(event) {
  const files = event.target.files;
  if (!files || files.length === 0) return;
  const project = getActiveProject();
  if (!project) return;
  if (!project.photos) project.photos = [];
  
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e) {
      // Compress image
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const maxW = 1200;
        let w = img.width, h = img.height;
        if (w > maxW) { h = h * (maxW / w); w = maxW; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
        project.photos.push({ id: generateId(), dataUrl, timestamp: new Date().toISOString(), note: '' });
        saveState();
        render();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function removePhoto(idx) {
  const project = getActiveProject();
  if (!project) return;
  project.photos.splice(idx, 1);
  saveState();
  render();
}

function viewPhoto(idx) {
  const project = getActiveProject();
  if (!project || !project.photos[idx]) return;
  const photo = project.photos[idx];
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = () => overlay.remove();
  overlay.innerHTML = `<div style="max-width:95vw;max-height:90vh;"><img src="${photo.dataUrl}" style="max-width:100%;max-height:85vh;border-radius:8px;"></div>`;
  document.body.appendChild(overlay);
}

// ========== DEAL ANALYZER TAB (Creative Addition) ==========
function renderDeal(container) {
  const project = getActiveProject();
  if (!project) {
    container.innerHTML = '<div class="card" style="text-align:center;padding:40px 20px;"><p style="color:var(--spark-gray);">Select a project first.</p></div>';
    return;
  }
  
  const repairCost = calculateTotal(project);
  const deal = project.deal || { arv: 0, purchasePrice: 0, holdingCosts: 0 };
  const totalCost = deal.purchasePrice + repairCost + deal.holdingCosts;
  const profit = deal.arv - totalCost;
  const roi = totalCost > 0 ? ((profit / totalCost) * 100) : 0;
  const maxOffer = (deal.arv * 0.7) - repairCost; // 70% rule
  const passesRule = deal.purchasePrice > 0 && deal.purchasePrice <= maxOffer;
  
  let html = '<div class="card">';
  html += '<h2 style="font-size:18px;font-weight:700;margin:0 0 4px;">💰 Deal Analyzer</h2>';
  html += '<p style="font-size:13px;color:var(--spark-gray);margin:0 0 16px;">Estimate profit using the 70% rule.</p>';
  
  html += `<div style="margin-bottom:12px;">
    <label style="font-size:13px;font-weight:500;display:block;margin-bottom:4px;">After Repair Value (ARV)</label>
    <input type="number" class="input" value="${deal.arv || ''}" placeholder="e.g. 180000" onchange="updateDeal('arv',this.value)">
  </div>`;
  html += `<div style="margin-bottom:12px;">
    <label style="font-size:13px;font-weight:500;display:block;margin-bottom:4px;">Purchase Price</label>
    <input type="number" class="input" value="${deal.purchasePrice || ''}" placeholder="e.g. 95000" onchange="updateDeal('purchasePrice',this.value)">
  </div>`;
  html += `<div style="margin-bottom:12px;">
    <label style="font-size:13px;font-weight:500;display:block;margin-bottom:4px;">Holding Costs (financing, taxes, utilities)</label>
    <input type="number" class="input" value="${deal.holdingCosts || ''}" placeholder="e.g. 5000" onchange="updateDeal('holdingCosts',this.value)">
  </div>`;
  html += '</div>';
  
  // Results card
  html += '<div class="card">';
  html += '<h3 style="font-size:15px;font-weight:600;margin:0 0 12px;">Analysis</h3>';
  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
    <div style="text-align:center;padding:12px;background:#f9fafb;border-radius:8px;">
      <div style="font-size:12px;color:var(--spark-gray);">Repair Cost</div>
      <div style="font-size:16px;font-weight:700;color:var(--spark-orange);">${formatCurrency(repairCost)}</div>
    </div>
    <div style="text-align:center;padding:12px;background:#f9fafb;border-radius:8px;">
      <div style="font-size:12px;color:var(--spark-gray);">Total Investment</div>
      <div style="font-size:16px;font-weight:700;">${formatCurrency(totalCost)}</div>
    </div>
    <div style="text-align:center;padding:12px;background:#f9fafb;border-radius:8px;">
      <div style="font-size:12px;color:var(--spark-gray);">Projected Profit</div>
      <div style="font-size:16px;font-weight:700;color:${profit >= 0 ? 'var(--spark-success)' : 'var(--spark-danger)'};">${formatCurrency(profit)}</div>
    </div>
    <div style="text-align:center;padding:12px;background:#f9fafb;border-radius:8px;">
      <div style="font-size:12px;color:var(--spark-gray);">ROI</div>
      <div style="font-size:16px;font-weight:700;">${roi.toFixed(1)}%</div>
    </div>
  </div>`;
  
  // 70% Rule
  html += `<div style="margin-top:16px;padding:12px;border-radius:8px;background:${passesRule ? '#d1fae5' : (deal.arv > 0 ? '#fee2e2' : '#f9fafb')};">
    <div style="font-size:13px;font-weight:600;">70% Rule Max Offer: ${formatCurrency(Math.max(0, maxOffer))}</div>
    <div style="font-size:12px;color:var(--spark-gray);margin-top:4px;">(ARV × 70%) − Repairs = Max Purchase Price</div>
    ${deal.purchasePrice > 0 ? `<div style="font-size:13px;font-weight:600;margin-top:8px;color:${passesRule ? '#065f46' : '#991b1b'};">${passesRule ? '✓ Deal passes the 70% rule' : '✗ Purchase price exceeds 70% rule'}</div>` : ''}
  </div>`;
  html += '</div>';
  
  container.innerHTML = html;
}

function updateDeal(field, value) {
  const project = getActiveProject();
  if (!project) return;
  if (!project.deal) project.deal = { arv: 0, purchasePrice: 0, holdingCosts: 0 };
  project.deal[field] = parseFloat(value) || 0;
  saveState();
  render();
}

async function exportProject() {
  const project = getActiveProject();
  if (!project) return;

  try {
    const zip = new JSZip();

    // Style definitions
    const titleStyle = { font: { bold: true, color: { rgb: "FFFFFF" }, sz: 14 }, fill: { fgColor: { rgb: "1a1a2e" } }, alignment: { horizontal: "center", vertical: "center" }, border: { top: { style: "thin", color: { rgb: "E85D04" } }, bottom: { style: "thin", color: { rgb: "E85D04" } }, left: { style: "thin", color: { rgb: "E85D04" } }, right: { style: "thin", color: { rgb: "E85D04" } } } };
    const subtitleStyle = { font: { sz: 11, color: { rgb: "666666" } }, alignment: { horizontal: "center" } };
    const sectionHeaderStyle = { font: { bold: true, color: { rgb: "FFFFFF" }, sz: 11 }, fill: { fgColor: { rgb: "E85D04" } } };
    const colHeaderStyle = { font: { bold: true, sz: 10 }, border: { bottom: { style: "thin", color: { rgb: "999999" } } } };
    const dataStyle = { font: { sz: 10 } };
    const currencyStyle = { font: { sz: 10 }, numFmt: "$#,##0.00" };
    const sectionTotalStyle = { font: { bold: true, color: { rgb: "E85D04" }, sz: 10 } };
    const sectionTotalCurrencyStyle = { font: { bold: true, color: { rgb: "E85D04" }, sz: 10 }, numFmt: "$#,##0.00" };
    const grandTotalStyle = { font: { bold: true, color: { rgb: "FFFFFF" }, sz: 12 }, fill: { fgColor: { rgb: "1a1a2e" } }, alignment: { horizontal: "center" } };
    const grandTotalCurrencyStyle = { font: { bold: true, color: { rgb: "FFFFFF" }, sz: 12 }, fill: { fgColor: { rgb: "1a1a2e" } }, numFmt: "$#,##0.00" };

    const rows = [];
    const cellStyles = {}; // "A1" -> style
    const merges = [];

    function addRow(cells, styles) {
      const rowIdx = rows.length;
      rows.push(cells);
      if (styles) {
        const cols = ['A','B','C','D','E'];
        cells.forEach((_, colIdx) => {
          if (colIdx < cols.length) {
            const ref = cols[colIdx] + (rowIdx + 1);
            cellStyles[ref] = styles[colIdx] || styles[0] || dataStyle;
          }
        });
      }
      return rowIdx;
    }

    // Row 1: Title
    let r = addRow(['SPARK EQUITY GROUP — REPAIR ESTIMATE', '', '', '', ''], [titleStyle, titleStyle, titleStyle, titleStyle, titleStyle]);
    merges.push({ s: { r: r, c: 0 }, e: { r: r, c: 4 } });

    // Row 2: Property & Date
    const dateStr = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    r = addRow([`Property: ${project.name}    Date: ${dateStr}`, '', '', '', ''], [subtitleStyle, subtitleStyle, subtitleStyle, subtitleStyle, subtitleStyle]);
    merges.push({ s: { r: r, c: 0 }, e: { r: r, c: 4 } });

    // Blank row
    addRow(['', '', '', '', '']);

    let grandTotal = 0;

    // Process each section
    const sections = getSections(project);
    sections.forEach(section => {
      const sectionItems = [];
      section.groups.forEach(group => {
        group.items.forEach(itemId => {
          const key = `${section.room.id}-${group.id}-${itemId}`;
          const li = project.lineItems[key];
          if (li && li.qty > 0) {
            const info = getItemInfo(itemId);
            const cost = getPrice(itemId, project);
            const lineTotal = li.qty * cost;
            sectionItems.push({ name: info.name, unit: info.unit, cost, qty: li.qty, total: lineTotal });
          }
        });
      });

      if (sectionItems.length === 0) return;

      // Section header (orange)
      r = addRow([section.label.toUpperCase(), '', '', '', ''], [sectionHeaderStyle, sectionHeaderStyle, sectionHeaderStyle, sectionHeaderStyle, sectionHeaderStyle]);
      merges.push({ s: { r: r, c: 0 }, e: { r: r, c: 4 } });

      // Column headers
      addRow(['Repair Item', 'Unit', 'Unit Cost', 'Qty', 'Estimate'], [colHeaderStyle, colHeaderStyle, colHeaderStyle, colHeaderStyle, colHeaderStyle]);

      // Data rows
      let sectionTotal = 0;
      sectionItems.forEach(item => {
        addRow([item.name, item.unit, item.cost, item.qty, item.total], [dataStyle, dataStyle, currencyStyle, dataStyle, currencyStyle]);
        sectionTotal += item.total;
      });
      grandTotal += sectionTotal;

      // Section total
      addRow([`${section.label} Total`, '', '', '', sectionTotal], [sectionTotalStyle, sectionTotalStyle, sectionTotalStyle, sectionTotalStyle, sectionTotalCurrencyStyle]);

      // Blank row
      addRow(['', '', '', '', '']);
    });

    // Grand total row
    r = addRow(['', 'TOTAL ESTIMATE', '', '', grandTotal], [grandTotalStyle, grandTotalStyle, grandTotalStyle, grandTotalStyle, grandTotalCurrencyStyle]);
    merges.push({ s: { r: r, c: 0 }, e: { r: r, c: 3 } });

    // Create worksheet
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!merges'] = merges;
    ws['!cols'] = [{ wch: 35 }, { wch: 15 }, { wch: 12 }, { wch: 8 }, { wch: 14 }];

    // Apply styles
    Object.entries(cellStyles).forEach(([ref, style]) => {
      if (ws[ref]) { ws[ref].s = style; }
    });

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Estimate');
    const xlsxData = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    zip.file(`Repair-Estimate-${project.name}.xlsx`, xlsxData);

    // Add photos
    if (project.photos && project.photos.length > 0) {
      const photosFolder = zip.folder('photos');
      project.photos.forEach((photo, idx) => {
        const base64 = photo.dataUrl.split(',')[1];
        photosFolder.file(`photo_${idx + 1}.jpg`, base64, { base64: true });
      });
    }

    // Generate and download
    const content = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(content);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Repair-Estimate-${project.name}.zip`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

  } catch(e) {
    alert('Export failed: ' + e.message);
    console.error(e);
  }
}
